# SPDX-License-Identifier: AGPL-3.0-or-later
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  frontend-gw:
    name: Frontend (Gateway)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: cd web && npm ci && npm run build
      - uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: web/dist/

  frontend-nas:
    name: Frontend (NAS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web-nas/package-lock.json
      - run: cd web-nas && npm ci && npm run build
      - uses: actions/upload-artifact@v7
        with:
          name: web-nas-dist
          path: web-nas/dist/

  build:
    name: Build ${{ matrix.target }}
    needs: [frontend-gw, frontend-nas]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            use_cross: false
          - target: aarch64-unknown-linux-musl
            use_cross: true

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools (x86_64)
        if: matrix.use_cross == false
        run: sudo apt-get update -qq && sudo apt-get install -y musl-tools

      - name: Install cross (aarch64)
        if: matrix.use_cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: web/dist/

      - uses: actions/download-artifact@v8
        with:
          name: web-nas-dist
          path: web-nas/dist/

      - name: Build release (native)
        if: matrix.use_cross == false
        run: |
          cargo build --release --bin sfgw --target ${{ matrix.target }}
          cargo build --release --bin secfirstnas --target ${{ matrix.target }}

      - name: Build release (cross)
        if: matrix.use_cross == true
        run: |
          cross build --release --bin sfgw --target ${{ matrix.target }}
          cross build --release --bin secfirstnas --target ${{ matrix.target }}

      - name: Package Gateway
        run: |
          mkdir -p staging-gw
          cp target/${{ matrix.target }}/release/sfgw staging-gw/
          cp -r web/dist staging-gw/
          cp scripts/clean-and-install.sh staging-gw/
          tar -czf secfirstgw-${{ matrix.target }}.tar.gz -C staging-gw .

      - name: Package NAS
        run: |
          mkdir -p staging-nas
          cp target/${{ matrix.target }}/release/secfirstnas staging-nas/
          cp -r web-nas/dist staging-nas/
          cp scripts/secfirstnas.initd staging-nas/
          cp scripts/nas-firewall.nft staging-nas/
          tar -czf secfirstnas-${{ matrix.target }}.tar.gz -C staging-nas .

      - uses: actions/upload-artifact@v7
        with:
          name: secfirstgw-${{ matrix.target }}
          path: secfirstgw-${{ matrix.target }}.tar.gz

      - uses: actions/upload-artifact@v7
        with:
          name: secfirstnas-${{ matrix.target }}
          path: secfirstnas-${{ matrix.target }}.tar.gz

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Generate checksums
        run: |
          cd artifacts
          find . -name '*.tar.gz' -exec mv {} . \;
          sha256sum *.tar.gz > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/SHA256SUMS
