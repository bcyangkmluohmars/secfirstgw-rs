# Cross-compilation targets for secfirstgw-rs
#
# aarch64-unknown-linux-musl: UDM Pro, ARM routers (static binary, no glibc dependency)
# x86_64-unknown-linux-musl:  x86 appliances, VMs (static binary)
#
# Install toolchains:
#   rustup target add aarch64-unknown-linux-musl x86_64-unknown-linux-musl
#   apt install gcc-aarch64-linux-gnu  # or: brew install aarch64-elf-gcc

[target.aarch64-unknown-linux-musl]
linker = "aarch64-linux-musl-gcc"
rustflags = ["-C", "target-feature=+crt-static"]

[target.x86_64-unknown-linux-musl]
rustflags = ["-C", "target-feature=+crt-static"]
